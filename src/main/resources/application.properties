spring.application.name=marketplace-poc

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/marketplace}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.jwt.secret=${APP_JWT_SECRET:my-super-secure-jwt-secret-key-at-least-32-chars}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:3600}
